name: Flutter Full Build (Fixed + Artifacts)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. Setup Flutter
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # =========================
      # 3. Find Flutter project root
      # =========================
      - name: Detect project root
        id: detect
        run: |
          DIR=$(find . -name pubspec.yaml -not -path "*/.git/*" | head -n 1 | xargs dirname)

          if [ -z "$DIR" ]; then
            echo "ERROR: pubspec.yaml not found"
            exit 1
          fi

          echo "PROJECT=$DIR" >> $GITHUB_OUTPUT

      # =========================
      # 4. Install dependencies
      # =========================
      - name: Flutter Pub Get
        working-directory: ${{ steps.detect.outputs.PROJECT }}
        run: flutter pub get

      # =========================
      # 5. Enable Web
      # =========================
      - name: Enable Web
        run: flutter config --enable-web

      # =========================
      # 6. Build ALL (Android + Web)
      # =========================
      - name: Build APK
        working-directory: ${{ steps.detect.outputs.PROJECT }}
        run: flutter build apk --release

      - name: Build AAB
        working-directory: ${{ steps.detect.outputs.PROJECT }}
        run: flutter build appbundle --release

      - name: Build Web
        working-directory: ${{ steps.detect.outputs.PROJECT }}
        run: flutter build web --release

      # =========================
      # 7. iOS (macOS job split optional)
      # =========================
  ios:
    runs-on: macos-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Detect project root
        id: detect
        run: |
          DIR=$(find . -name pubspec.yaml | head -n 1 | xargs dirname)
          echo "PROJECT=$DIR" >> $GITHUB_OUTPUT

      - name: Install dependencies
        working-directory: ${{ steps.detect.outputs.PROJECT }}
        run: flutter pub get

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Pod install
        working-directory: ${{ steps.detect.outputs.PROJECT }}/ios
        run: pod install

      - name: Build iOS (no codesign)
        working-directory: ${{ steps.detect.outputs.PROJECT }}
        run: flutter build ios --release --no-codesign

      # =========================
      # Create IPA
      # =========================
      - name: Create IPA
        working-directory: ${{ steps.detect.outputs.PROJECT }}
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      # =========================
      # 8. UPLOAD ALL ARTIFACTS
      # =========================
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ steps.detect.outputs.PROJECT }}/build/app/outputs/flutter-apk/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: ${{ steps.detect.outputs.PROJECT }}/build/app/outputs/bundle/release/*.aab

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: ${{ steps.detect.outputs.PROJECT }}/build/web

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.detect.outputs.PROJECT }}/app.ipa
