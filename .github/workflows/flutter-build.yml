name: Flutter God Mode CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Bump version'
        default: 'patch'
        type: choice
        options: [major, minor, patch, none]

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.24.3'
  APP_DIR: flutter_app

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.semver.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      # สร้างโฟลเดอร์ก่อนทำอย่างอื่น
      - name: Create app folder
        run: |
          mkdir -p ${{ env.APP_DIR }}
          ls -la

      - name: Setup Flutter project
        working-directory: ${{ env.APP_DIR }}
        run: |
          if [! -f pubspec.yaml ]; then
            echo "Creating new Flutter project"
            cd..
            flutter create ${{ env.APP_DIR }} --project-name flutter_app
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: anothrNick/github-tag-action@1.71.0
        id: semver
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ github.event.inputs.bump_version }}
          WITH_V: true

      - name: Update version
        if: steps.semver.outputs.new_tag!= ''
        working-directory: ${{ env.APP_DIR }}
        run: |
          sed -i "s/^version:.*/version: ${{ steps.semver.outputs.new_version }}+${{ github.run_number }}/" pubspec.yaml
          cat pubspec.yaml | grep version
          git add.
          git commit -m "chore: ${{ steps.semver.outputs.new_tag }} [skip ci]" || true
          git push

  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure folder
        run: mkdir -p ${{ env.APP_DIR }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Create if missing
        run: |
          if [! -d "${{ env.APP_DIR }}/lib" ]; then
            flutter create ${{ env.APP_DIR }}
          fi

      - name: Build
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter pub get
          flutter build apk --release --build-number=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/
