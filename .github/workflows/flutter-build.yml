name: Flutter CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Bump'
        default: 'patch'
        type: choice
        options: [patch, minor, major, none]

permissions:
  contents: write

env:
  APP: flutter_app

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable

      - name: Create project
        run: |
          if [ ! -f "$APP/pubspec.yaml" ]; then
            rm -rf $APP
            flutter create $APP --org com.example --project-name myapp
          fi
          ls -la $APP

      - name: Git config
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Bump tag
        id: tag
        if: github.event.inputs.bump_version!= 'none'
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ github.event.inputs.bump_version }}
          WITH_V: true

      - name: Update pubspec
        if: steps.tag.outputs.new_tag!= ''
        run: |
          VERSION=${{ steps.tag.outputs.new_version }}
          FILE="$APP/pubspec.yaml"
          
          echo "Updating $FILE"
          sed -i "s/^version: .*/version: $VERSION+${{ github.run_number }}/" "$FILE"
          grep "^version:" "$FILE"
          
          git add "$FILE"
          git commit -m "release: ${{ steps.tag.outputs.new_tag }} [skip ci]" || true
          git push

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Build APK
        run: |
          # สร้างถ้าไม่มี
          if [ ! -f "$APP/pubspec.yaml" ]; then
            flutter create $APP
          fi
          
          cd $APP
          flutter pub get
          flutter build apk --release --build-number ${{ github.run_number }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
