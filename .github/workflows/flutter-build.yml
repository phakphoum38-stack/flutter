name: Flutter God Mode CI/CD

on:
  push:
    branches: [ "main", "develop", "release/**" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      deploy_track:
        description: 'Deploy track'
        required: true
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production, none]
      bump_version:
        description: 'Bump version'
        required: false
        default: 'none'
        type: choice
        options: [major, minor, patch, none]
      run_integration:
        description: 'Run integration tests'
        required: false
        default: true
        type: boolean

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.24.3'
  FLUTTER_CHANNEL: 'stable'
  ANDROID_PACKAGE_NAME: com.yourcompany.app
  IOS_BUNDLE_ID: com.yourcompany.app
  FIREBASE_PROJECT_ID: your-firebase-proj
  SENTRY_ORG: your-org
  SENTRY_PROJECT: your-flutter-app

jobs:
  version:
    name: Semantic Version
    if: github.event.inputs.bump_version!= 'none' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semver.outputs.new_version }}
      new_tag: ${{ steps.semver.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: anothrNick/github-tag-action@1.71.0
        id: semver
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ github.event.inputs.bump_version }}
          WITH_V: true
      - name: Update pubspec.yaml
        run: |
          sed -i "s/^version:.*/version: ${{ steps.semver.outputs.new_version }}+${{ github.run_number }}/" pubspec.yaml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.semver.outputs.new_version }}"
          git push

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk
        uses: snyk/actions/gradle-jdk17@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=android/app/build.gradle
      - name: Dart Audit
        run: |
          dart pub global activate pana
          pana --no-warning.

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: version
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed.
      - run: flutter analyze --fatal-infos --fatal-warnings
      - run: flutter test --coverage --reporter expanded

  build:
    name: Build ${{ matrix.flavor }}-${{ matrix.target }}
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: dev
            target: android-aab
            os: ubuntu-latest
          - flavor: staging
            target: android-aab
            os: ubuntu-latest
          - flavor: prod
            target: android-aab
            os: ubuntu-latest
          - flavor: dev
            target: android-apk
            os: ubuntu-latest
          - flavor: staging
            target: android-apk
            os: ubuntu-latest
          - flavor: prod
            target: android-apk
            os: ubuntu-latest
          - flavor: dev
            target: ios-ipa
            os: macos-latest
          - flavor: staging
            target: ios-ipa
            os: macos-latest
          - flavor: prod
            target: ios-ipa
            os: macos-latest
          - flavor: dev
            target: web
            os: ubuntu-latest
          - flavor: staging
            target: web
            os: ubuntu-latest
          - flavor: prod
            target: web
            os: ubuntu-latest
          - flavor: prod
            target: windows
            os: windows-latest
          - flavor: prod
            target: macos
            os: macos-latest
          - flavor: prod
            target: linux
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Linux deps
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: actions/setup-java@v4
        if: contains(matrix.target, 'android')
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Android Signing
        if: contains(matrix.target, 'android')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: iOS Signing
        if: matrix.target == 'ios-ipa'
        run: |
          # ใช้ secret แยกตาม flavor แทน format()
          if [ "${{ matrix.flavor }}" = "dev" ]; then
            echo "${{ secrets.IOS_CERT_BASE64_DEV }}" | base64 --decode > /tmp/cert.p12
            echo "${{ secrets.IOS_PP_BASE64_DEV }}" | base64 --decode > /tmp/profile.mobileprovision
          elif [ "${{ matrix.flavor }}" = "staging" ]; then
            echo "${{ secrets.IOS_CERT_BASE64_STAGING }}" | base64 --decode > /tmp/cert.p12
            echo "${{ secrets.IOS_PP_BASE64_STAGING }}" | base64 --decode > /tmp/profile.mobileprovision
          else
            echo "${{ secrets.IOS_CERT_BASE64_PROD }}" | base64 --decode > /tmp/cert.p12
            echo "${{ secrets.IOS_PP_BASE64_PROD }}" | base64 --decode > /tmp/profile.mobileprovision
          fi
          security create-keychain -p "ci" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "${{ secrets.IOS_CERT_PASSWORD }}" -T /usr/bin/codesign
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - run: flutter config --enable-windows-desktop --enable-macos-desktop --enable-linux-desktop
      - run: flutter pub get
      - run: cd ios && pod install --repo-update
        if: matrix.target == 'ios-ipa'

      - name: Build
        run: |
          case "${{ matrix.target }}" in
            android-aab) flutter build appbundle --release --flavor ${{ matrix.flavor }} --build-number=${{ github.run_number }} ;;
            android-apk) flutter build apk --release --flavor ${{ matrix.flavor }} --split-per-abi --build-number=${{ github.run_number }} ;;
            ios-ipa) flutter build ipa --release --flavor ${{ matrix.flavor }} --build-number=${{ github.run_number }} --export-options-plist=ios/ExportOptions-${{ matrix.flavor }}.plist ;;
            web) flutter build web --release --dart-define=FLAVOR=${{ matrix.flavor }} --web-renderer canvaskit ;;
            windows) flutter build windows --release --dart-define=FLAVOR=${{ matrix.flavor }} ;;
            macos) flutter build macos --release --dart-define=FLAVOR=${{ matrix.flavor }} ;;
            linux) flutter build linux --release --dart-define=FLAVOR=${{ matrix.flavor }} ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.flavor }}-${{ matrix.target }}
          path: |
            build/**/*.aab
            build/**/*.apk
            build/**/*.ipa
            build/web
            build/windows
            build/macos
            build/linux
          retention-days: 14
